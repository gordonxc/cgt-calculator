<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Gains Tax 計算機</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Capital Gains Tax 計算機</h1>
  <p class="subtitle">多股票 · 多次買入 · 即時計算 CGT 免稅額</p>

  <!-- Global Settings -->
  <div class="card">
    <div class="card-title">⚙️ 全局設定</div>
    <div class="input-group">
      <label>
        英鎊兌美金匯率
        <span class="currency-hint">1 GBP = ? USD</span>
      </label>
      <div class="input-wrap">
        <input type="number" id="fxRate" step="0.0001" min="0" placeholder="1.2700" value="1.27">
        <button class="fx-refresh" id="fxRefresh" title="自動獲取匯率">🔄</button>
      </div>
      <div class="fx-source" id="fxSource"></div>
    </div>

    <div class="input-group">
      <label>
        免稅限額（CGT Allowance）
        <span class="currency-hint">GBP</span>
        <span class="preset-btn" id="preset3000">£3,000</span>
        <span class="preset-btn" id="preset6000">£6,000</span>
      </label>
      <div class="input-wrap">
        <span class="input-prefix">£</span>
        <input type="number" id="allowance" step="1" min="0" placeholder="0" value="3000">
      </div>
    </div>
  </div>

  <!-- Stock Cards (dynamic) -->
  <div id="stockList"></div>

  <!-- Add Stock Button -->
  <button class="btn-add-stock" id="addStock">+ 新增股票</button>

  <!-- Global Summary -->
  <div class="card result-card">
    <div class="summary-grid">
      <div class="summary-item">
        <div class="summary-label">總盈利（GBP）</div>
        <div class="summary-value" id="totalGainGbp">£0.00</div>
      </div>
      <div class="summary-item">
        <div class="summary-label">剩餘免稅額</div>
        <div class="summary-value amber" id="remainingAllowance">£0.00</div>
      </div>
    </div>

    <div class="allowance-bar-wrap">
      <div class="allowance-bar">
        <div class="allowance-bar-fill" id="allowanceBarFill"></div>
      </div>
      <div class="allowance-bar-labels">
        <span id="allowanceUsed">£0.00 / £0.00</span>
        <span id="allowancePct">0%</span>
      </div>
    </div>

    <div class="warning" id="warning" style="display:none;"></div>
  </div>

  <p class="info">
    每股盈利 = (賣出價 − 加權平均買入價) ÷ 匯率<br>
    加權平均 = Σ(買入價 × 數量) ÷ 總數量<br>
    僅供參考，實際稅務以 HMRC 為準
  </p>
</div>

<script src="app.js"></script>
</body>
</html>
