<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capital Gains Tax 計算機</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Capital Gains Tax 計算機</h1>
  <p class="subtitle">計算最多可以賣幾多股而唔超過免稅額</p>

  <div class="card">
    <div class="input-group">
      <label>
        買入價（每股）
        <span class="currency-hint">USD</span>
      </label>
      <div class="input-wrap">
        <span class="input-prefix">$</span>
        <input type="number" id="buyPrice" step="0.01" min="0" placeholder="0.00" value="100">
      </div>
    </div>

    <div class="input-group">
      <label>
        賣出價（每股）
        <span class="currency-hint">USD</span>
      </label>
      <div class="input-wrap">
        <span class="input-prefix">$</span>
        <input type="number" id="sellPrice" step="0.01" min="0" placeholder="0.00" value="120">
      </div>
    </div>

    <div class="input-group">
      <label>
        英鎊兌美金匯率
        <span class="currency-hint">1 GBP = ? USD</span>
      </label>
      <div class="input-wrap">
        <input type="number" id="fxRate" step="0.0001" min="0" placeholder="1.2700" value="1.27">
        <button class="fx-refresh" id="fxRefresh" title="自動獲取匯率">🔄</button>
      </div>
      <div class="fx-source" id="fxSource"></div>
    </div>

    <div class="input-group">
      <label>
        免稅限額（CGT Allowance）
        <span class="currency-hint">GBP</span>
        <span class="preset-btn" id="preset3000">£3,000</span>
      </label>
      <div class="input-wrap">
        <span class="input-prefix">£</span>
        <input type="number" id="allowance" step="1" min="0" placeholder="0" value="3000">
      </div>
    </div>
  </div>

  <div class="card result-card">
    <div class="result-main">
      <div class="result-label">建議賣出股數</div>
      <div class="result-value" id="maxShares">0</div>
      <div class="result-unit">股</div>
    </div>

    <div class="breakdown" id="breakdown">
      <div class="breakdown-row">
        <span class="breakdown-label">每股盈利（USD）</span>
        <span class="breakdown-value" id="gainUsd">$0.00</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-label">每股盈利（GBP）</span>
        <span class="breakdown-value" id="gainGbp">£0.00</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-label">總賣出金額（USD）</span>
        <span class="breakdown-value" id="totalSellUsd">$0.00</span>
      </div>
      <div class="breakdown-row total">
        <span class="breakdown-label">總盈利（GBP）</span>
        <span class="breakdown-value green" id="totalGainGbp">£0.00</span>
      </div>
      <div class="breakdown-row">
        <span class="breakdown-label">剩餘免稅額</span>
        <span class="breakdown-value amber" id="remainingAllowance">£0.00</span>
      </div>
    </div>

    <div class="warning" id="warning" style="display:none;"></div>
  </div>

  <p class="info">
    計算方式：(賣出價 - 買入價) ÷ 匯率 = 每股盈利（GBP）<br>
    免稅額 ÷ 每股盈利 = 最多可賣股數<br>
    僅供參考，實際稅務以 HMRC 為準
  </p>
</div>

<script src="app.js"></script>
</body>
</html>
